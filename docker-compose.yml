version: '3.8'

services:
  app:
    build:
      context: ./app
    container_name: vision_assist_app
    volumes:
      - ./app:/workspace
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=http://ollama:11434
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: vision_assist_llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama

volumes:
  ollama_storage: