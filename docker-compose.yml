services:
  app:
    build:
      context: ./app
    container_name: vision_assist_app
    image: visionassist_user-module-app
    volumes:
      - ./app:/workspace
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=http://vision_assist_llm_local:11434
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}      
    ports:
      - "8501:8501"  # <-- FIX: Maps Streamlit's default port out to your Windows host browser
    stdin_open: true
    tty: true
    depends_on:
      - ollama
      - postgres
      - qdrant
    # Run the precheck migration script before starting Streamlit
    command: python main.py
    
    # ... rest of your service configuration (volumes, ports, depends_on)  
    #devices:
    #  - /dev/snd:/dev/snd  # Maps host sound card layers directly to the container

  ollama:
    image: ollama/ollama:latest
    container_name: vision_assist_llm_local
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama

  postgres:
    image: postgres:16-alpine  # lightweight Alpine-based Postgres image
    container_name: vision_assist_db
    hostname: db  # reachable as "db" on the compose network
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      # Password comes from a Docker secret file instead of a plain env var
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_DB=${POSTGRES_DB}
    secrets:
      - postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - db
          - postgres
          - vision_assist_db          

  qdrant:
    image: qdrant/qdrant:latest  # vector database
    container_name: vision_assist_qdrant
    hostname: qdrant  # reachable as "qdrant" on the compose network
    restart: unless-stopped
    # Qdrant has no native *_FILE support, so read the API key from the mounted
    # secret and export it before launching the server.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'export QDRANT__SERVICE__API_KEY="$(cat /run/secrets/qdrant_api_key)"; exec ./entrypoint.sh'
    secrets:
      - qdrant_api_key
    ports:
      - "6333:6333"  # REST / HTTP API + dashboard
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      default:
        aliases:
          - qdrant

volumes:
  ollama_storage:
  postgres_storage:
  qdrant_storage:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt  # base64-encoded password (see README)
  qdrant_api_key:
    file: ./secrets/qdrant_api_key.txt  # Qdrant API key (see README)